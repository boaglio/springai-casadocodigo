management:
  endpoint:
    health.show-details: always
  endpoints:
   web.exposure.include: '*'
  tracing:
    sampling:
      probability: 1.0

spring:
  application:
    name: twingpt
  ai:
    chat:
      client:
        observations:
          include-input: false
          include-output: false
      observations:
        enabled: true
  zipkin:
    base-url: http://localhost:9411

server:
  port: 13000

springdoc:
  cache:
    disabled: true
  swagger-ui:
    display-request-duration: true
    use-root-path: true
    groups-order: DESC
    operationsSorter: method
  version: 1.0